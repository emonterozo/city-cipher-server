<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify Your Email - Red Line Rewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      .m-0 {
        margin: 0;
      }
      .mx-auto {
        margin-left: auto;
        margin-right: auto;
      }
      .w-full {
        width: 100%;
      }
      .max-w-xl {
        max-width: 36rem;
      }
      .bg-white {
        background-color: #ffffff;
      }
      .bg-warm-white {
        background-color: #fbfbfb;
      }
      .text-primary {
        color: #dc143c;
      }
      .text-black {
        color: #000000;
      }
      .text-dark-gray {
        color: #333333;
      }
      .text-center {
        text-align: center;
      }
      .font-bold {
        font-weight: 700;
      }
      .no-underline {
        text-decoration: none;
      }

      /* OTP Box Styling */
      .otp-container {
        padding: 30px 0;
        text-align: center;
      }
      .otp-box {
        display: inline-block;
        background-color: #f4f4f4;
        border: 2px dashed #dc143c;
        border-radius: 12px;
        padding: 20px 40px;
      }
      .otp-number {
        font-size: 42px;
        font-weight: 800;
        color: #dc143c;
        letter-spacing: 10px;
        font-family: "Courier New", Courier, monospace;
      }
    </style>
  </head>
  <body class="m-0" style="margin: 0; padding: 0; background-color: #ffffff">
    <div
      class="mx-auto w-full max-w-xl"
      style="font-family: &quot;Source Sans Pro&quot;, sans-serif"
    >
      <table
        role="presentation"
        class="w-full bg-white"
        style="width: 100%; border-collapse: collapse"
      >
        <tbody>
          <tr>
            <td
              class="bg-warm-white"
              style="padding: 1.75rem 2.25rem; border-bottom: 1px solid #eeeeee"
            >
              <table role="presentation" style="width: 100%">
                <tr>
                  <td
                    style="
                      text-align: right;
                      font-size: 20px;
                      font-weight: 700;
                      color: #000000;
                    "
                  >
                    Verify your Email
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding: 2.5rem 2.5rem 1rem 2.5rem">
              <h1 style="font-size: 30px; margin: 0 0 1rem 0">
                Hi, <span class="text-primary">{{name}}!</span>
              </h1>
              <p
                style="
                  font-size: 16px;
                  color: #4f4f4f;
                  line-height: 1.6;
                  margin: 0;
                "
              >
                To activate your
                <span class="text-primary" style="font-weight: 600"
                  >Red Line Rewards</span
                >
                account, please use the verification code below:
              </p>
            </td>
          </tr>

          <tr>
            <td class="otp-container">
              <div class="otp-box">
                <span class="otp-number">{{otpCode}}</span>
              </div>
              <p
                style="
                  font-size: 12px;
                  color: #999;
                  margin-top: 15px;
                  text-transform: uppercase;
                  letter-spacing: 1px;
                "
              >
                Code expires in {{expiryMinutes}} minutes
              </p>
            </td>
          </tr>

          <tr>
            <td
              style="
                padding: 2rem 2.5rem;
                text-align: center;
                border-top: 1px solid #f0f0f0;
              "
            >
              <p
                style="
                  font-weight: 600;
                  font-size: 14px;
                  margin-bottom: 15px;
                  text-transform: uppercase;
                  letter-spacing: 1px;
                "
              >
                Connect With Us
              </p>
              <a
                href="https://www.facebook.com/people/Red-Line-Detailing-Auto-Spa/61586431965530/"
                class="no-underline"
                style="margin: 0 10px"
              >
                <img
                  src="https://www.redlinedetailingph.com/icons/facebook.png"
                  alt="Facebook"
                  style="width: 24px; opacity: 0.8"
                />
              </a>
              <a
                href="https://www.instagram.com/redlinedetailing.ph"
                class="no-underline"
                style="margin: 0 10px"
              >
                <img
                  src="https://www.redlinedetailingph.com/icons/instagram.png"
                  alt="Instagram"
                  style="width: 24px; opacity: 0.8"
                />
              </a>
              <a
                href="https://www.tiktok.com/@redlinedetailing.ph"
                class="no-underline"
                style="margin: 0 10px"
              >
                <img
                  src="https://www.redlinedetailingph.com/icons/tiktok.png"
                  alt="Tiktok"
                  style="width: 24px; opacity: 0.8"
                />
              </a>
            </td>
          </tr>

          <tr>
            <td
              style="
                padding: 1.5rem;
                background-color: #dc143c;
                text-align: center;
              "
            >
              <p
                style="
                  color: #ffffff;
                  font-size: 12px;
                  margin: 0;
                  font-weight: 600;
                  letter-spacing: 0.5px;
                "
              >
                © {{year}} Red Line Detailing & Auto Spa
              </p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
