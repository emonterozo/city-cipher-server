<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badge Earned - PIT CREW</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      .m-0 {
        margin: 0;
      }
      .mx-auto {
        margin-left: auto;
        margin-right: auto;
      }
      .w-full {
        width: 100%;
      }
      .max-w-xl {
        max-width: 36rem;
      }
      .text-primary {
        color: #dc143c;
      }
      .badge-container {
        padding: 30px 2.5rem;
      }
      .badge-card {
        border-radius: 2rem;
        padding: 24px;
        text-align: left;
        background-color: #111111;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .points-bar {
        margin-top: 16px;
        padding: 10px;
        border-radius: 12px;
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="m-0" style="margin: 0; padding: 0; background-color: #ffffff">
    <div
      class="mx-auto w-full max-w-xl"
      style="font-family: &quot;Source Sans Pro&quot;, sans-serif"
    >
      <table
        role="presentation"
        class="w-full"
        style="width: 100%; border-collapse: collapse"
      >
        <tbody>
          <tr>
            <td
              style="padding: 1.75rem 2.25rem; border-bottom: 1px solid #eeeeee"
            >
              <table role="presentation" style="width: 100%">
                <tr>
                  <td>
                    <img
                      src="https://www.redlinedetailingph.com/logo.png"
                      alt="Red Line"
                      style="max-height: 25px"
                    />
                  </td>
                  <td
                    style="
                      text-align: right;
                      font-size: 18px;
                      font-weight: 700;
                      color: #000000;
                      text-transform: uppercase;
                      letter-spacing: 1px;
                    "
                  >
                    Achievement
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding: 2.5rem 2.5rem 0 2.5rem">
              <h1 style="font-size: 28px; font-weight: 900; margin: 0 0 10px 0">
                Congrats, <span class="text-primary">{{name}}!</span>
              </h1>
              <p
                style="
                  font-size: 15px;
                  color: #666666;
                  line-height: 1.5;
                  margin: 0;
                "
              >
                Thank you for the trust! Your first service is complete.
              </p>
            </td>
          </tr>
          <tr>
            <td class="badge-container">
              <table role="presentation" class="badge-card" style="width: 100%">
                <tr>
                  <td style="width: 60px; vertical-align: middle">
                    <div
                      style="
                        background: #dc143c;
                        padding: 12px;
                        border-radius: 16px;
                        text-align: center;
                      "
                    >
                      <img
                        src="https://img.icons8.com/ios-filled/32/ffffff/shield-check.png"
                        style="width: 24px; vertical-align: middle"
                      />
                    </div>
                  </td>
                  <td style="padding-left: 15px">
                    <h4
                      style="
                        color: #ffffff;
                        font-size: 14px;
                        font-weight: 900;
                        margin: 0;
                        letter-spacing: 0.2em;
                        text-transform: uppercase;
                      "
                    >
                      PIT CREW
                    </h4>
                    <p
                      style="
                        color: #ffffff;
                        font-size: 10px;
                        font-weight: 700;
                        margin: 4px 0 0 0;
                        text-transform: uppercase;
                        opacity: 0.8;
                      "
                    >
                      First Service Completed
                    </p>
                  </td>
                </tr>
                <tr>
                  <td colspan="2">
                    <div class="points-bar">
                      <table role="presentation">
                        <tr>
                          <td>
                            <img
                              src="https://img.icons8.com/ios-filled/16/dc143c/flash-on.png"
                              style="width: 12px"
                            />
                          </td>
                          <td
                            style="
                              color: #ffffff;
                              font-size: 10px;
                              font-weight: 900;
                              padding-left: 8px;
                              letter-spacing: 1px;
                            "
                          >
                            +20 WELCOME PTS EARNED
                          </td>
                        </tr>
                      </table>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td
              style="
                padding: 2rem 2.5rem;
                text-align: center;
                border-top: 1px solid #f0f0f0;
              "
            >
              <a
                href="https://www.facebook.com/people/Red-Line-Detailing-Auto-Spa/61586431965530/"
                style="margin: 0 10px; text-decoration: none"
                ><img
                  src="https://www.redlinedetailingph.com/icons/facebook.png"
                  alt="FB"
                  style="width: 24px; opacity: 0.5"
              /></a>
              <a
                href="https://www.instagram.com/redlinedetailing.ph"
                style="margin: 0 10px; text-decoration: none"
                ><img
                  src="https://www.redlinedetailingph.com/icons/instagram.png"
                  alt="IG"
                  style="width: 24px; opacity: 0.5"
              /></a>
              <a
                href="https://www.tiktok.com/@redlinedetailing.ph"
                style="margin: 0 10px; text-decoration: none"
                ><img
                  src="https://www.redlinedetailingph.com/icons/tiktok.png"
                  alt="TT"
                  style="width: 24px; opacity: 0.5"
              /></a>
              <p
                style="
                  color: #cccccc;
                  font-size: 10px;
                  font-weight: 700;
                  margin-top: 20px;
                  letter-spacing: 1px;
                "
              >
                © {{year}} RED LINE DETAILING
              </p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
